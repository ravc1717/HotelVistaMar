!DOCTY<PE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Habitaciones</title>
</head>
<body>
    <h1>Habitaciones</h1>

    <a href="/habitaciones/nueva">Nueva Habitación</a>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Número</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>

        <tr th:each="h : ${habitaciones}">
            <td th:text="${h.id}"></td>
            <td th:text="${h.numero}"></td>
            <td th:text="${h.tipo}"></td>
            <td th:text="${h.precio}"></td>
            <td th:text="${h.estado}"></td>
            <td>
                <a th:href="@{'/habitaciones/editar/' + ${h.id}}">Editar</a>
                <a th:href="@{'/habitaciones/eliminar/' + ${h.id}}">Eliminar</a>
            </td>
        </tr>
    </table>

    <br>
    <a href="/">Volver al inicio</a>
</body>
</html>
