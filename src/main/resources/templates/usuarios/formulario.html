<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Usuario</title>
</head>
<body>
    <h1>Usuario</h1>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}"><br><br>

        <label>Correo:</label>
        <input type="email" th:field="*{correo}"><br><br>

        <label>Edad:</label>
        <input type="number" th:field="*{edad}"><br><br>

        <label>Rol:</label>
        <input type="text" th:field="*{rol}"><br><br>

        <button type="submit">Guardar</button>
    </form>

    <br>
    <a href="/usuarios">Volver</a>
</body>
</html>
