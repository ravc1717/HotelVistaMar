<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Reserva</title>
</head>
<body>
    <h1>Reserva</h1>

    <form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Usuario:</label>
        <select th:field="*{usuario}">
            <option th:each="u : ${usuarios}"
                    th:value="${u.id}"
                    th:text="${u.nombre}">
            </option>
        </select>

        <br><br>

        <label>Habitación:</label>
        <select th:field="*{habitacion}">
            <option th:each="h : ${habitaciones}"
                    th:value="${h.id}"
                    th:text="${h.numero}">
            </option>
        </select>

        <br><br>

        <label>Fecha inicio:</label>
        <input type="date" th:field="*{fecha_inicio}"><br><br>

        <label>Fecha fin:</label>
        <input type="date" th:field="*{fecha_fin}"><br><br>

        <label>Total:</label>
        <input type="number" step="0.01" th:field="*{total}"><br><br>

        <button type="submit">Guardar</button>
    </form>

    <br>
    <a href="/reservas">Volver</a>
</body>
</html>
